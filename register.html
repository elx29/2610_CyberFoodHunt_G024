<!DOCTYPE html>

                      "secondary-fixed-dim": "#a3cbea",
                      "secondary-container": "#b7dffe",
                      "surface-tint": "#444cd6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scrapbook-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c2 0 3-1 3-3s-1-3-3-3-3 1-3 3 1 3 3 3zm10-10c1 0 2-1 2-2s-1-2-2-2-2 1-2 2 1 2 2 2zM20 10c1 0 2-1 2-2s-1-2-2-2-2 1-2 2 1 2 2 2z' fill='%234F57E1' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .sticker-shadow {
            box-shadow: 0 4px 0px 0px rgba(22, 66, 91, 0.1);
        }
    </style>

<body class="bg-background font-body text-on-surface scrapbook-bg min-h-screen selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="relative flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">
    <!-- <a class="absolute top-8 left-8 z-50 flex items-center gap-2 font-label text-xs font-bold uppercase tracking-widest text-secondary hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-xl transition-transform group-hover:-translate-x-1">arrow_back</span>
<span>Back to Discovery</span> nav button
</a> -->
<div class="absolute top-10 left-10 opacity-20 pointer-events-none transform -rotate-12">
<span class="material-symbols-outlined text-7xl text-primary" style="">fastfood</span>
</div>
<div class="absolute bottom-20 right-10 opacity-20 pointer-events-none transform rotate-45">
<span class="material-symbols-outlined text-8xl text-primary" style="">restaurant_menu</span>
</div>
<div class="absolute top-1/4 right-20 opacity-10 pointer-events-none transform -rotate-6">
<span class="material-symbols-outlined text-6xl text-primary" style="">local_pizza</span>
</div>
<header class="z-10 mb-12 text-center">
<h1 class="font-headline font-black text-6xl md:text-8xl text-primary-container italic tracking-tighter drop-shadow-sm" style="">
                Cyber Food Hunt
            </h1>
<p class="font-headline font-medium text-secondary mt-2 tracking-widest uppercase text-xs" style="">The Ultimate Website for MMU Foodies</p>
</header>
<div class="relative w-full max-w-lg flex flex-col items-center">
<!-- Secondary Decorative Box Behind Main Form to Keep Aesthetic -->
<div class="absolute -inset-4 bg-surface-container-high rounded-xl transform rotate-3 shadow-[0_24px_40px_-15px_rgba(22,66,91,0.05)] -z-10"></div>
<section class="relative z-20 bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_24px_40px_-15px_rgba(22,66,91,0.08)] transform -rotate-1 w-full">
<div class="absolute -top-4 -left-4 text-primary opacity-40">
<span class="material-symbols-outlined text-4xl" style='font-variation-settings: "FILL" 1;'>star</span>
</div>
<div class="absolute -bottom-4 -right-4 text-primary opacity-30 transform rotate-12">
<span class="material-symbols-outlined text-4xl" style='font-variation-settings: "FILL" 1;'>star</span>
</div>
<h2 class="font-headline text-3xl font-bold text-on-surface mb-6 border-b-4 border-surface-container-high pb-2 inline-block" style="">Join the hunt</h2>
<form class="space-y-5">
<div class="space-y-1">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary ml-1" style="">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 focus:ring-2 focus:ring-primary-container text-sm font-medium placeholder:text-outline-variant" placeholder="student@mmu.edu.my" type="email"/>
</div>
<div class="space-y-1">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary ml-1" style="">password</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 focus:ring-2 focus:ring-primary-container text-sm font-medium placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<div class="text-right">
<a class="font-label text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#" style="">Forgot Password?</a>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-headline font-bold py-3 rounded-lg sticker-shadow transform transition-transform active:scale-95 hover:scale-[1.02] mt-4 flex items-center justify-center gap-2" style="" type="submit">
<span class="material-symbols-outlined text-lg" style="">login</span>Sign Up</button>
<div class="pt-4 text-center">
<p class="text-xs font-medium text-on-surface-variant" style="">Already have an account? <a class="text-primary hover:text-primary-container font-bold transition-colors" href="login.html">Log in</a></p>
</div>
</form>
</section>
<div class="relative w-full max-w-sm mt-12 p-4 transform rotate-1">
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none">
<span class="material-symbols-outlined absolute top-[15%] right-[25%] text-primary opacity-20 scale-75" style='font-variation-settings: "FILL" 1;'>star</span>
<span class="material-symbols-outlined absolute bottom-[20%] left-[20%] text-primary opacity-10 scale-125" style='font-variation-settings: "FILL" 1;'>star</span>
<span class="material-symbols-outlined absolute top-[40%] left-[5%] text-secondary opacity-15 scale-50" style='font-variation-settings: "FILL" 1;'>star</span>
<span class="material-symbols-outlined absolute bottom-[10%] right-[15%] text-primary opacity-20" style='font-variation-settings: "FILL" 1;'>star</span>
</div>
<div class="absolute top-1/2 left-0 -translate-x-1/2 w-96 h-96 bg-primary-fixed-dim/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-0 right-0 translate-x-1/4 w-80 h-80 bg-secondary-fixed/30 rounded-full blur-[100px] pointer-events-none"></div>
</main>
</body></html>

<!-- Restaurant Selection -->

</div>
<!-- Star Rating -->
<div class="space-y-3">
  <label class="font-headline font-bold text-on-surface-variant">Rate your experience</label>
  
  <div class="flex gap-2" id="starRating">
    
    <span class="material-symbols-outlined text-4xl cursor-pointer text-outline-variant" data-value="1">star</span>
    <span class="material-symbols-outlined text-4xl cursor-pointer text-outline-variant" data-value="2">star</span>
    <span class="material-symbols-outlined text-4xl cursor-pointer text-outline-variant" data-value="3">star</span>
    <span class="material-symbols-outlined text-4xl cursor-pointer text-outline-variant" data-value="4">star</span>
    <span class="material-symbols-outlined text-4xl cursor-pointer text-outline-variant" data-value="5">star</span>
    
  </div>

  <!-- Hidden input (useful later for Django form) -->
  <input type="hidden" id="ratingValue" name="rating" value="0">
</div>

<script>
  const stars = document.querySelectorAll("#starRating span");
  const ratingInput = document.getElementById("ratingValue");

  stars.forEach((star, index) => {
    star.addEventListener("click", () => {
      let rating = index + 1;
      ratingInput.value = rating;

      stars.forEach((s, i) => {
        if (i < rating) {
          s.style.color = "#343bc8"; // filled color
          s.style.fontVariationSettings = "'FILL' 1";
        } else {
          s.style.color = "#c6c5d7"; // empty color
          s.style.fontVariationSettings = "'FILL' 0";
        }
      });
    });
  });
</script>
